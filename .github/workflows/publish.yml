# Publishes the Python package (lmoments-uq) to PyPI via Trusted
# Publishing (OIDC) — no API token stored anywhere. Requires a
# matching Trusted Publisher entry on PyPI:
#   owner: DeepanJayaraman, repo: L-UQ,
#   workflow: publish.yml, environment: pypi
# Runs whenever a GitHub Release is published.
name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        working-directory: python
        run: |
          python -m pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: python/dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
